name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5  # 唯一修改：v4 -> v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
