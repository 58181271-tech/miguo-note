name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest  # 改成ubuntu，兼容性更好
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4  # 固定使用v4版本
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # 显式指定项目根目录和参数
          args: >
            -Dsonar.projectKey=miguo-note
            -Dsonar.sources=src
            -Dsonar.java.binaries=.
            -Dsonar.java.source=8
